[package]
name = "rustate"
version = "0.3.0"
edition = "2021"
authors = ["junkawasaki"]
description = "A Rust library for creating and managing state machines, inspired by XState."
license = "MIT OR Apache-2.0"
repository = "https://github.com/junkawasaki/rustate"
readme = "../../README.md"
keywords = ["statemachine", "statechart", "xstate", "actor", "async"]
categories = ["concurrency", "asynchronous", "data-structures"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
tokio = { version = "1", features = ["sync", "macros", "time", "rt-multi-thread"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
thiserror = "1.0"
async-recursion = "1.0"
futures = "0.3"
tracing = "0.1"
wasm-bindgen-futures = "0.4"
log = "0.4"

wasm-bindgen = { version = "0.2", optional = true }
web-sys = { version = "0.3", features = ["console"], optional = true }
console_error_panic_hook = { version = "0.1", optional = true }
js-sys = { version = "0.3", optional = true }
getrandom = { version = "0.2", features = ["js"], optional = true }

proptest = { version = "1.0", optional = true }

rustate-macros = { path = "../rustate-macros", optional = true }

[features]
default = ["mbt", "integration", "macros"]
macros = ["dep:rustate-macros"]
wasm = [
    "dep:wasm-bindgen",
    "dep:web-sys",
    "dep:console_error_panic_hook",
    "dep:js-sys",
    "dep:getrandom",
    "uuid/js"
]
integration = []
integration_async = []
codegen = []
mbt = []
property-testing = ["mbt", "dep:proptest"]
xstate-compat = []

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
futures = "0.3" 