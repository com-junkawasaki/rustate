<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rustate Editor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        
        .editor-app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .toolbar {
            display: flex;
            padding: 10px;
            background-color: #333;
            color: white;
        }
        
        .button-group {
            margin-right: 20px;
        }
        
        button {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 8px 12px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 14px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 4px;
        }
        
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        
        button.active {
            background-color: #45a049;
            border: 2px solid white;
        }
        
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        .editor-panel {
            width: 300px;
            padding: 10px;
            background-color: #f0f0f0;
            overflow-y: auto;
        }
        
        .canvas-container {
            flex: 1;
            background-color: white;
            overflow: auto;
            position: relative;
        }
        
        .canvas {
            position: relative;
            width: 2000px;
            height: 2000px;
        }
        
        .properties-panel {
            width: 300px;
            padding: 10px;
            background-color: #f0f0f0;
            overflow-y: auto;
        }
        
        .state {
            position: absolute;
            width: 120px;
            height: 80px;
            background-color: #4CAF50;
            color: white;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: move;
        }
        
        .state-selected {
            border: 3px solid #333;
        }
        
        .state-final-marker {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 10px;
            height: 10px;
            background-color: white;
            border-radius: 50%;
        }
        
        .transition {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .transition line {
            pointer-events: auto;
            cursor: pointer;
        }
        
        .transition-selected line {
            stroke: #4CAF50;
            stroke-width: 3;
        }
        
        .transition text {
            pointer-events: auto;
            cursor: pointer;
            font-size: 12px;
        }
        
        .property-group {
            margin-bottom: 10px;
        }
        
        .property-group label {
            display: block;
            margin-bottom: 5px;
        }
        
        .property-group input {
            width: 100%;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div id="editor-container"></div>
    
    <script type="module">
        import init, { Editor } from './pkg/rustate_editor.js';
        
        async function run() {
            await init();
            
            const editor = new Editor();
            editor.render();
            
            // サンプルデータを読み込む
            const sampleData = {
                "id": "traffic_light",
                "initial": "red",
                "states": {
                    "red": {
                        "name": "Red",
                        "initial": false,
                        "metadata": { "x": 100, "y": 100 },
                        "is_final": false,
                        "substates": [],
                        "transitions": [],
                        "on_entry": null,
                        "on_exit": null,
                        "invoke": null
                    },
                    "yellow": {
                        "name": "Yellow",
                        "initial": false,
                        "metadata": { "x": 300, "y": 100 },
                        "is_final": false,
                        "substates": [],
                        "transitions": [],
                        "on_entry": null,
                        "on_exit": null,
                        "invoke": null
                    },
                    "green": {
                        "name": "Green",
                        "initial": false,
                        "metadata": { "x": 500, "y": 100 },
                        "is_final": false,
                        "substates": [],
                        "transitions": [],
                        "on_entry": null,
                        "on_exit": null,
                        "invoke": null
                    }
                },
                "transitions": {
                    "t1": {
                        "source": "red",
                        "target": "green",
                        "event": "TIMER",
                        "guard": null,
                        "actions": []
                    },
                    "t2": {
                        "source": "green",
                        "target": "yellow",
                        "event": "TIMER",
                        "guard": null,
                        "actions": []
                    },
                    "t3": {
                        "source": "yellow",
                        "target": "red",
                        "event": "TIMER",
                        "guard": null,
                        "actions": []
                    }
                },
                "context": null
            };
            
            try {
                editor.load_from_json(JSON.stringify(sampleData));
            } catch (e) {
                console.error("サンプルデータ読み込みエラー:", e);
            }
        }
        
        run();
    </script>
</body>
</html>
