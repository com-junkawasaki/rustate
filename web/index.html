<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuState Demo - Rust Statecharts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>RuState Demos</h1>
        <p>Interactive demos of statecharts implemented in Rust and compiled to WebAssembly</p>
        <nav>
            <a href="index.html" class="nav-link">Demos</a>
            <a href="docs.html" class="nav-link">Documentation</a>
        </nav>
    </header>
    
    <main>
        <section id="traffic-light">
            <h2>Traffic Light Demo</h2>
            <div class="demo-container">
                <div class="traffic-light">
                    <div class="light red" id="red-light"></div>
                    <div class="light yellow" id="yellow-light"></div>
                    <div class="light green" id="green-light"></div>
                </div>
                <div class="controls">
                    <button id="traffic-timer-btn">Send Timer Event</button>
                    <div class="state-display">
                        Current State: <span id="traffic-state">Initializing...</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="music-player">
            <h2>Music Player Demo</h2>
            <div class="demo-container">
                <div class="music-player">
                    <div class="player-display">
                        <div class="player-screen" id="player-screen">
                            <div id="player-track">Track: 0</div>
                            <div id="player-status">Status: Initializing...</div>
                        </div>
                    </div>
                    <div class="player-controls">
                        <button id="power-btn">Power</button>
                        <button id="play-btn">Play</button>
                        <button id="pause-btn">Pause</button>
                        <button id="stop-btn">Stop</button>
                        <button id="prev-btn">Previous</button>
                        <button id="next-btn">Next</button>
                        <button id="speed-up-btn">Speed Up</button>
                        <button id="speed-normal-btn">Normal Speed</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>Powered by Rust + WebAssembly</p>
        <p><a href="https://github.com/rustate-org/rustate" target="_blank" rel="noopener">GitHub</a></p>
    </footer>

    <script type="module" src="index.js"></script>
</body>
</html>
