<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuState Demo - Rust Statecharts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>RuState Demos</h1>
        <p>Interactive demos of statecharts implemented in Rust and compiled to WebAssembly</p>
        <nav>
            <a href="index.html" class="nav-link">Demos</a>
            <a href="docs.html" class="nav-link">Documentation</a>
        </nav>
    </header>
    
    <main>
        <section id="traffic-light">
            <h2>Traffic Light Demo</h2>
            <div class="demo-container">
                <div class="traffic-light">
                    <div class="light red" id="red-light"></div>
                    <div class="light yellow" id="yellow-light"></div>
                    <div class="light green" id="green-light"></div>
                </div>
                <div class="controls">
                    <button id="traffic-timer-btn">Send Timer Event</button>
                    <div class="state-display">
                        Current State: <span id="traffic-state">Initializing...</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="music-player">
            <h2>Music Player Demo</h2>
            <div class="demo-container">
                <div class="music-player">
                    <div class="player-display">
                        <div class="player-screen" id="player-screen">
                            <div id="player-track">Track: 0</div>
                            <div id="player-status">Status: Initializing...</div>
                        </div>
                    </div>
                    <div class="player-controls">
                        <button id="power-btn">Power</button>
                        <button id="play-btn">Play</button>
                        <button id="pause-btn">Pause</button>
                        <button id="stop-btn">Stop</button>
                        <button id="prev-btn">Previous</button>
                        <button id="next-btn">Next</button>
                        <button id="speed-up-btn">Speed Up</button>
                        <button id="speed-normal-btn">Normal Speed</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>Powered by Rust + WebAssembly</p>
        <p><a href="https://github.com/rustate-org/rustate" target="_blank" rel="noopener">GitHub</a></p>
    </footer>

    <script type="module" src="index.js"></script>
<script>"use strict";

(function () {

    const address = '{{__TRUNK_ADDRESS__}}';
    const base = '{{__TRUNK_WS_BASE__}}';
    let protocol = '';
    protocol =
        protocol
            ? protocol
            : window.location.protocol === 'https:'
                ? 'wss'
                : 'ws';
    const url = protocol + '://' + address + base + '.well-known/trunk/ws';

    class Overlay {
        constructor() {
            // create an overlay
            this._overlay = document.createElement("div");
            const style = this._overlay.style;
            style.height = "100vh";
            style.width = "100vw";
            style.position = "fixed";
            style.top = "0";
            style.left = "0";
            style.backgroundColor = "rgba(222, 222, 222, 0.5)";
            style.fontFamily = "sans-serif";
            // not sure that's the right approach
            style.zIndex = "1000000";
            style.backdropFilter = "blur(1rem)";

            const container = document.createElement("div");
            // center it
            container.style.position = "absolute";
            container.style.top = "30%";
            container.style.left = "15%";
            container.style.maxWidth = "85%";

            this._title = document.createElement("div");
            this._title.innerText = "Build failure";
            this._title.style.paddingBottom = "2rem";
            this._title.style.fontSize = "2.5rem";

            this._message = document.createElement("div");
            this._message.style.whiteSpace = "pre-wrap";

            const icon= document.createElement("div");
            icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#dc3545" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>';
            this._title.prepend(icon);

            container.append(this._title, this._message);
            this._overlay.append(container);

            this._inject();
            window.setInterval(() => {
                this._inject();
            }, 250);
        }

        set reason(reason) {
            this._message.textContent = reason;
        }

        _inject() {
            if (!this._overlay.isConnected) {
                // prepend it
                document.body?.prepend(this._overlay);
            }
        }

    }

    class Client {
        constructor(url) {
            this.url = url;
            this.poll_interval = 5000;
            this._overlay = null;
        }

        start() {
            const ws = new WebSocket(this.url);
            ws.onmessage = (ev) => {
                const msg = JSON.parse(ev.data);
                switch (msg.type) {
                    case "reload":
                        this.reload();
                        break;
                    case "buildFailure":
                        this.buildFailure(msg.data)
                        break;
                }
            };
            ws.onclose = () => this.onclose();
        }

        onclose() {
            window.setTimeout(
                () => {
                    // when we successfully reconnect, we'll force a
                    // reload (since we presumably lost connection to
                    // trunk due to it being killed, so it will have
                    // rebuilt on restart)
                    const ws = new WebSocket(this.url);
                    ws.onopen = () => window.location.reload();
                    ws.onclose = () => this.onclose();
                },
                this.poll_interval);
        }

        reload() {
            window.location.reload();
        }

        buildFailure({reason}) {
            // also log the console
            console.error("Build failed:", reason);

            console.debug("Overlay", this._overlay);

            if (!this._overlay) {
                this._overlay = new Overlay();
            }
            this._overlay.reason = reason;
        }
    }

    new Client(url).start();

})()
</script></body>
</html>
