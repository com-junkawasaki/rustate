<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuState Debug</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        div { margin-bottom: 10px; }
        button { margin: 5px; padding: 5px 10px; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow: auto; }
    </style>
</head>
<body>
    <h1>RuState Debug Page</h1>
    <div>
        <button id="init-wasm">1. Initialize WASM</button>
        <button id="check-functions">2. Check Available Functions</button>
    </div>
    <div>
        <button id="init-traffic">3. Initialize Traffic Light</button>
        <button id="send-timer">4. Send Timer Event</button>
        <button id="init-music">5. Initialize Music Player</button>
    </div>
    <div>
        <h3>Console Output</h3>
        <pre id="output">Click buttons in order (1-5) to test functionality...</pre>
    </div>

    <script type="module">
        // Get elements
        const output = document.getElementById('output');
        
        // Helper to log to both console and UI
        function log(message) {
            console.log(message);
            output.textContent += "\n" + message;
            output.scrollTop = output.scrollHeight;
        }
        
        // Global module reference
        let wasmModule = null;
        
        // Define callback functions that Rust will call
        window.updateTrafficLightUI = function(state) {
            log(`Traffic light state update: ${state}`);
        };
        
        window.updateMusicPlayerUI = function(statesJson) {
            try {
                const states = JSON.parse(statesJson);
                log(`Music player states: ${states.join(', ')}`);
            } catch (error) {
                log(`Error parsing music player states: ${error.message}`);
            }
        };
        
        // Button 1: Initialize WASM
        document.getElementById('init-wasm').addEventListener('click', async () => {
            try {
                log("Importing WASM module...");
                // Dynamic import to handle errors better
                const module = await import('./pkg/rustate.js');
                wasmModule = module;
                
                log("Initializing WASM module...");
                await module.init();
                log("✓ WASM module initialized successfully!");
            } catch (error) {
                log(`❌ Error initializing WASM: ${error.message}`);
                if (error.stack) log(error.stack);
            }
        });
        
        // Button 2: Check available functions
        document.getElementById('check-functions').addEventListener('click', () => {
            if (!wasmModule) {
                log("❌ WASM module not initialized. Click 'Initialize WASM' first.");
                return;
            }
            
            log("Available functions in WASM module:");
            Object.keys(wasmModule).forEach(key => {
                log(`- ${key}: ${typeof wasmModule[key]}`);
            });
        });
        
        // Button 3: Initialize Traffic Light
        document.getElementById('init-traffic').addEventListener('click', async () => {
            if (!wasmModule) {
                log("❌ WASM module not initialized. Click 'Initialize WASM' first.");
                return;
            }
            
            try {
                log("Initializing traffic light...");
                await wasmModule.init_traffic_light();
                log("✓ Traffic light initialized!");
            } catch (error) {
                log(`❌ Error initializing traffic light: ${error.message}`);
                if (error.stack) log(error.stack);
            }
        });
        
        // Button 4: Send Timer Event
        document.getElementById('send-timer').addEventListener('click', () => {
            if (!wasmModule) {
                log("❌ WASM module not initialized. Click 'Initialize WASM' first.");
                return;
            }
            
            try {
                log("Sending TIMER event to traffic light...");
                wasmModule.send_traffic_light_event('TIMER');
                log("✓ TIMER event sent!");
            } catch (error) {
                log(`❌ Error sending TIMER event: ${error.message}`);
                if (error.stack) log(error.stack);
            }
        });
        
        // Button 5: Initialize Music Player
        document.getElementById('init-music').addEventListener('click', async () => {
            if (!wasmModule) {
                log("❌ WASM module not initialized. Click 'Initialize WASM' first.");
                return;
            }
            
            try {
                log("Initializing music player...");
                await wasmModule.init_music_player();
                log("✓ Music player initialized!");
            } catch (error) {
                log(`❌ Error initializing music player: ${error.message}`);
                if (error.stack) log(error.stack);
            }
        });
    </script>
</body>
</html>
