syntax = "proto3";

package shopping;

message State {
  string id = 1;
  string type = 2;
  string parent = 3;
}

message Transition {
  string source = 1;
  string event = 2;
  string target = 3;
  string guard = 4;
}

message Action {
  string id = 1;
  string type = 2;
  string state_id = 3;
}

message ShoppingCart {
  string name = 1;
  string initial = 2;
  map<string, State> states = 3;
  repeated Transition transitions = 4;
  repeated Action actions = 5;
}
